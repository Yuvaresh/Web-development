<!DOCTYPE html>
<html lang="en"></html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch Tunes | Emotion-Based Music</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Sketch Tunes</h1>
    <p>Draw your mood. Let AI find the perfect soundtrack.</p>
  </header>

  <main class="container">
    <!-- Drawing Workspace -->
    <section class="card workspace">
      <h2>✏️ Sketch Your Emotion</h2>
      
      <div class="toolbar">
        <div class="tools">
          <button id="pen-btn" class="btn active">Pen</button>
          <button id="eraser-btn" class="btn">Eraser</button>
        </div>
        <button id="clear-btn" class="btn btn-danger">Clear</button>
      </div>

      <div class="canvas-container">
        <canvas id="drawing-canvas"></canvas>
      </div>

      <button id="submit-btn" class="btn btn-primary">Find My Tune</button>
    </section>

    <!-- Results Area -->
    <section class="card results">
      <!-- Initial State -->
      <div id="initial-view" class="placeholder-state">
        <i>🎵</i>
        <p>Your recommendations will appear here after you submit your sketch.</p>
      </div>

      <!-- Loading State -->
      <div id="loading-view" class="placeholder-state hidden">
        <div class="loader"></div>
        <p>Analyzing emotional expression...</p>
      </div>

      <!-- Result State -->
      <div id="result-view" class="hidden">
        <div class="emotion-display">
          <p style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Detected Emotion</p>
          <h3 id="emotion-text" class="emotion-tag happy">HAPPY</h3>
        </div>

        <div class="playlist">
          <h3>Your Soundtrack</h3>
          <ul id="song-list" class="song-list">
            <!-- Populated dynamically via JS -->
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
